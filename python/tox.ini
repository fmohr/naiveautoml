[tox]
minversion = 3.12.0
envlist = flake8, py312, mypy

[gh-actions]
python =
    3.12: flake8, py312, mypy

[testenv]
setenv =
    PYTHONPATH = {toxinidir}
deps =
    -rrequirements.txt
    -rrequirements_dev.txt
commands = pytest test -x --durations=0


[testenv:flake8]
basepython = python3.12
deps = flake8
commands = flake8 --max-line-length 120 naiveautoml

[testenv:mypy]
basepython = python3.12
deps =
    types-requests
    mypy
commands = mypy .
